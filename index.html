<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Cendek | Rangkaian Intelektual Belia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .nav-link { font-family: 'Montserrat', sans-serif; }
        .bg-ngo-green { background-color: #166534; }
        .bg-ngo-yellow { background-color: #facc15; }
        .text-ngo-green { color: #166534; }
        
        /* สไตล์สำหรับการเลื่อนโลโก้ (Logo Slider) */
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-250px * 5)); } /* ปรับตามจำนวนโลโก้ */
        }
        .slider-container {
            overflow: hidden;
            width: 100%;
            background: white;
            padding: 40px 0;
        }
        .slider-track {
            display: flex;
            width: calc(250px * 10); /* ความกว้างรวมโลโก้ทั้งหมด (รวมที่ clone มา) */
            animation: scroll 30s linear infinite;
        }
        .slide {
            width: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
        }
        .slide img {
            max-width: 150px;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: 0.3s;
        }
        .slide img:hover {
            filter: grayscale(0%);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Header & Navigation (ตามสไตล์ ABIM) -->
    <nav class="bg-white py-4 shadow-sm border-b sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center space-x-2">
                <div class="w-12 h-12 bg-ngo-green rounded-full flex items-center justify-center text-white font-bold text-xl">JP</div>
                <div class="text-2xl font-800 text-ngo-green tracking-tighter">CENDEK</div>
            </div>

            <!-- Links -->
            <div class="hidden lg:flex space-x-6 text-[12px] font-700 text-ngo-green uppercase">
                <a href="about.html" class="hover:text-ngo-yellow transition">Mengenai ABIM</a>
                <a href="programs.html" class="hover:text-ngo-yellow transition">Berita & Program</a>
                <a href="resources.html" class="hover:text-ngo-yellow transition">Jaringan</a>
                <a href="contact.html" class="hover:text-ngo-yellow transition">Hubungi Kami</a>
            </div>

            <!-- CTA Buttons -->
            <div class="hidden md:flex space-x-3">
                <a href="#" class="bg-ngo-green text-white px-5 py-2 rounded text-[12px] font-bold hover:bg-green-800 transition uppercase tracking-wider">Jom Jadi Ahli</a>
                <a href="#" class="bg-ngo-yellow text-green-900 px-5 py-2 rounded text-[12px] font-bold hover:bg-yellow-400 transition uppercase tracking-wider">Sumbang & Infaq</a>
            </div>
        </div>
    </nav>

    <!-- Impact Section (กล่องขาวตามภาพ) -->
    <section class="py-16 -mt-10">
        <div class="container mx-auto px-6">
            <div class="bg-white rounded-3xl shadow-xl flex flex-wrap lg:flex-nowrap divide-y lg:divide-y-0 lg:divide-x border border-gray-100 overflow-hidden">
                
                <!-- Item 1 -->
                <div class="w-full lg:w-1/5 p-10 text-center flex flex-col items-center">
                    <div class="mb-4 text-ngo-green">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m-4 18h4"></path></svg>
                    </div>
                    <div class="text-3xl font-800 text-ngo-green mb-2 counter" data-target="132">0</div>
                    <div class="text-[11px] font-700 text-gray-500 uppercase leading-tight tracking-widest">Cawangan Seluruh Negara</div>
                </div>

                <!-- Item 2 -->
                <div class="w-full lg:w-1/5 p-10 text-center flex flex-col items-center">
                    <div class="mb-4 text-ngo-green">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <div class="text-3xl font-800 text-ngo-green mb-2 counter" data-target="20">0+</div>
                    <div class="text-[11px] font-700 text-gray-500 uppercase leading-tight tracking-widest">Agensi Rangkaian</div>
                </div>

                <!-- Item 3 -->
                <div class="w-full lg:w-1/5 p-10 text-center flex flex-col items-center">
                    <div class="mb-4 text-ngo-green">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <div class="text-3xl font-800 text-ngo-green mb-2 counter" data-target="320">0</div>
                    <div class="text-[11px] font-700 text-gray-500 uppercase leading-tight tracking-widest">Hab Pembelajaran</div>
                </div>

                <!-- Item 4 -->
                <div class="w-full lg:w-1/5 p-10 text-center flex flex-col items-center">
                    <div class="mb-4 text-ngo-green">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                    <div class="text-3xl font-800 text-ngo-green mb-2 counter" data-target="3000">0+</div>
                    <div class="text-[11px] font-700 text-gray-500 uppercase leading-tight tracking-widest">Sukarelawan Cendek</div>
                </div>

                <!-- Item 5 -->
                <div class="w-full lg:w-1/5 p-10 text-center flex flex-col items-center">
                    <div class="mb-4 text-ngo-green">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <div class="text-3xl font-800 text-ngo-green mb-2 counter" data-target="42000">0+</div>
                    <div class="text-[11px] font-700 text-gray-500 uppercase leading-tight tracking-widest">Keahlian Aktif</div>
                </div>

            </div>
        </div>
    </section>

    <!-- Logo Slider (ตามที่คุณต้องการ - Jaringan Logo เลื่อน) -->
    <div class="slider-container">
        <div class="text-center mb-10">
            <h2 class="text-ngo-green font-bold uppercase tracking-widest text-sm">Rakan Kerjasama Kami</h2>
        </div>
        <div class="slider-track">
            <!-- Logo 1 -->
            <div class="slide"><img src="images/logo1.png" alt="Logo"></div>
            <!-- Logo 2 -->
            <div class="slide"><img src="images/logo2.png" alt="Logo"></div>
            <!-- Logo 3 -->
            <div class="slide"><img src="images/logo3.png" alt="Logo"></div>
            <!-- Logo 4 -->
            <div class="slide"><img src="images/logo4.png" alt="Logo"></div>
            <!-- Logo 5 -->
            <div class="slide"><img src="images/logo5.png" alt="Logo"></div>
            
            <!-- Clone logos for seamless loop -->
            <div class="slide"><img src="images/logo1.png" alt="Logo"></div>
            <div class="slide"><img src="images/logo2.png" alt="Logo"></div>
            <div class="slide"><img src="images/logo3.png" alt="Logo"></div>
            <div class="slide"><img src="images/logo4.png" alt="Logo"></div>
            <div class="slide"><img src="images/logo5.png" alt="Logo"></div>
        </div>
    </div>

    <!-- เชื่อมต่อ JS เดิมที่เขียนไว้สำหรับ Counter -->
    <script src="js/script.js"></script>
</body>
</html>
